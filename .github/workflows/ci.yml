name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: adventurer_sheet
          POSTGRES_USER: bot
          POSTGRES_PASSWORD: bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U bot -d adventurer_sheet"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://bot:bot@localhost:5432/adventurer_sheet

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests with coverage
        run: pytest --cov --cov-report=term-missing

  # Deploy is handled by Railway's GitHub integration (auto-deploy on push).
  # GitHub Actions serves as the quality gate: lint + test must pass.
  # Railway auto-deploys from main independently.


name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests with coverage
        run: pytest --cov --cov-report=term-missing

  # Deploy is handled by Railway's GitHub integration (auto-deploy on push).
  # GitHub Actions serves as the quality gate: lint + test must pass.
  # Railway auto-deploys from main independently.

